<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inverse Corner (Cutout) — Box</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0c0c0c;
        --box: #ff5722;
        --box-2: #1b1b1b;
        --text: #ededed;
        --muted: #9a9a9a;
        --r: 36px;     /* cutout radius */
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100%;
      }

      .stage {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 56px 24px;
        gap: 48px;
      }

      h1 {
        text-align: center;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0;
      }
      h1 .accent { color: var(--box); }

      p.lead {
        text-align: center;
        color: var(--muted);
        margin: -28px 0 0;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, 260px);
        gap: 28px;
      }

      .box {
        position: relative;
        width: 260px;
        height: 180px;
        background: var(--box);
        border-radius: 22px;
        display: flex;
        align-items: flex-end;
        padding: 18px;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: -0.01em;
      }

      .box small {
        position: absolute;
        top: 14px;
        left: 18px;
        color: rgba(255, 255, 255, 0.7);
        font-weight: 500;
        font-size: 11.5px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      /*
        The trick: a radial-gradient mask "punches out"
        a circle of radius --r at one corner, leaving a
        concave (inverse) curve. The corner stays sharp
        on the inside of the cut, so combine with
        border-radius for the other three corners.
      */
      .cut-tl {
        --mask:
          radial-gradient(var(--r) at var(--r) var(--r),
            transparent 98%, #000 100%)
          top left / calc(var(--r) * 2) calc(var(--r) * 2)
          no-repeat,
          linear-gradient(#000 0 0);
        -webkit-mask: var(--mask);
        mask: var(--mask);
        -webkit-mask-composite: source-out, source-over;
        mask-composite: subtract;
      }

      .cut-tr {
        --mask:
          radial-gradient(var(--r) at calc(100% - var(--r)) var(--r),
            transparent 98%, #000 100%)
          top right / calc(var(--r) * 2) calc(var(--r) * 2)
          no-repeat,
          linear-gradient(#000 0 0);
        -webkit-mask: var(--mask);
        mask: var(--mask);
        -webkit-mask-composite: source-out, source-over;
        mask-composite: subtract;
      }

      .cut-bl {
        --mask:
          radial-gradient(var(--r) at var(--r) calc(100% - var(--r)),
            transparent 98%, #000 100%)
          bottom left / calc(var(--r) * 2) calc(var(--r) * 2)
          no-repeat,
          linear-gradient(#000 0 0);
        -webkit-mask: var(--mask);
        mask: var(--mask);
        -webkit-mask-composite: source-out, source-over;
        mask-composite: subtract;
      }

      .cut-br {
        --mask:
          radial-gradient(var(--r)
            at calc(100% - var(--r)) calc(100% - var(--r)),
            transparent 98%, #000 100%)
          bottom right / calc(var(--r) * 2) calc(var(--r) * 2)
          no-repeat,
          linear-gradient(#000 0 0);
        -webkit-mask: var(--mask);
        mask: var(--mask);
        -webkit-mask-composite: source-out, source-over;
        mask-composite: subtract;
      }

      /* A second "tucked" element nested inside the cut area
         — like an arrow button sitting in the notch. */
      .notch-btn {
        position: absolute;
        width: calc(var(--r) * 2 - 12px);
        height: calc(var(--r) * 2 - 12px);
        background: #fff;
        color: #111;
        border-radius: 50%;
        display: grid;
        place-items: center;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
        cursor: pointer;
        transition: transform 0.2s ease;
      }
      .notch-btn:hover { transform: scale(1.08); }
      .notch-btn svg { width: 22px; height: 22px; }

      .cut-br .notch-btn { right: 6px; bottom: 6px; }
      .cut-bl .notch-btn { left: 6px; bottom: 6px; }
      .cut-tr .notch-btn { right: 6px; top: 6px; }
      .cut-tl .notch-btn { left: 6px; top: 6px; }

      @media (max-width: 620px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <h1>Inverse <span class="accent">Corner</span> Cutout</h1>
      <p class="lead">
        Single box, one mask layer. Change <code>--r</code> to resize the cut.
      </p>

      <div class="grid">
        <div class="box cut-tl">
          <small>top-left</small>
          <span>Concave corner</span>
          <button class="notch-btn" aria-label="Open">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round"
                 stroke-linejoin="round">
              <path d="M7 17L17 7" />
              <path d="M8 7h9v9" />
            </svg>
          </button>
        </div>

        <div class="box cut-tr">
          <small>top-right</small>
          <span>Concave corner</span>
          <button class="notch-btn" aria-label="Open">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round"
                 stroke-linejoin="round">
              <path d="M7 17L17 7" />
              <path d="M8 7h9v9" />
            </svg>
          </button>
        </div>

        <div class="box cut-bl">
          <small>bottom-left</small>
          <span>Concave corner</span>
          <button class="notch-btn" aria-label="Open">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round"
                 stroke-linejoin="round">
              <path d="M7 17L17 7" />
              <path d="M8 7h9v9" />
            </svg>
          </button>
        </div>

        <div class="box cut-br">
          <small>bottom-right</small>
          <span>Concave corner</span>
          <button class="notch-btn" aria-label="Open">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round"
                 stroke-linejoin="round">
              <path d="M7 17L17 7" />
              <path d="M8 7h9v9" />
            </svg>
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
